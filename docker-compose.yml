version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: caresync-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: healthcare_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: caresync-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password123@db:5432/healthcare_db?schema=public
      - JWT_SECRET=super-secret-jwt-signing-key-for-development
      - FRONTEND_URL=http://localhost:5180
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: caresync-frontend
    restart: always
    ports:
      - "5180:5180"
    depends_on:
      - backend

volumes:
  pgdata:
